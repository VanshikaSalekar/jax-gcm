defaults:
  - _self_
  - physics: speedy
  - grid: speedy_t31_l8
  - run: default
  - init: isothermal
  - terrain: aquaplanet
  - forcing: default
  - diffusion: default
  - override hydra/help: custom_help

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: multirun/${hydra.job.num}

app_name: JCM


template: |

  ${hydra.help.app_name}: JAX General Circulation Model
  ----
  Runs atmospheric simulations using configurable parameters.

  Usage:
  ------
    python -m jcm.main [OVERRIDES...]

  Use ``python -m jcm.main --cfg job`` to print the fully-composed config
  for the current overrides; ``--help`` lists every config-group choice.

  Config groups (under jcm/config/):
  ----------------------------------
    physics, grid, run, init, terrain, forcing, diffusion

  See the project README for runnable examples and the most common overrides.

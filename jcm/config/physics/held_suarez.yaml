# Held-Suarez (1994) idealised forcing — no moist physics, no radiation.
#
# A single term that does Newtonian temperature relaxation plus
# Rayleigh friction. ``HeldSuarez.__init__`` takes plain (unit-bearing)
# kwargs rather than a ``Parameters`` dataclass, so this YAML doesn't
# normally need overrides; tweak the Python defaults if you need them.

checkpoint_terms: true

terms:
  held_suarez:
    _target_: jcm.physics.held_suarez.held_suarez_physics.HeldSuarez

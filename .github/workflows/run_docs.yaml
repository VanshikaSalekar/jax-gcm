name: Validate documentation generation

# The SPEEDY variable-translation page is generated at Sphinx build time from
# jcm/physics/speedy/units_table.csv (see docs/source/conf.py); it is no longer
# committed back to the repo by CI (which bypassed the PR rule — issue #394).
# This job only *validates* that generation succeeds for changes that affect it,
# without write permission and without committing anything.

on:
  pull_request:
    paths:
      - 'jcm/physics/speedy/units_table.csv'
      - 'docs/generate_docs.py'
      - 'docs/source/conf.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate translation docs (no commit)
        run: python docs/generate_docs.py

      - name: Fail if generation produced no output
        run: test -s docs/source/speedy_translation.rst
